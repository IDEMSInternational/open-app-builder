<div class="course-sub-item" [attr.data-state]="state()" (click)="handleClick()">
  <span class="course-sub-item-title">{{ value() || params().title }}</span>
  <div class="state-container">
    @if (state() === "completed" || state() === "locked") {
      <span class="state-badge">
        @if (state() === "completed") {
          <p>{{ params().completedText | uppercase }}</p>
        }
        @if (state() === "locked") {
          <p>{{ params().lockedText | uppercase }}</p>
        }
      </span>
    }
    <ion-icon [name]="iconName()"></ion-icon>
  </div>
</div>
