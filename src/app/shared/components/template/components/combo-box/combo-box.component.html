@if (params().variant === "modal") {
  <button
    class="open-combobox"
    (click)="openModal()"
    [ngClass]="{
      disabled: disabled(),
      'placeholder-style': (!value() && params().placeholder) || params().prioritisePlaceholder,
      'with-value': !!value(),
      'no-value': !value(),
    }"
    [disabled]="disabled()"
  >
    {{ displayText() | translate }}
  </button>
} @else if (params().variant === "dropdown" && showSearch()) {
  <button
    class="open-search-combobox"
    (click)="openSearch()"
    [ngClass]="searchButtonClass()"
    [disabled]="disabled()"
  >
    <span class="text">{{ displayText() | translate }}</span>
    <ion-icon name="caret-down-sharp" size="small" aria-hidden="true"></ion-icon>
  </button>
} @else if (params().variant === "dropdown" && !showSearch()) {
  <combo-box-dropdown
    [value]="value()"
    [placeholder]="params().placeholder"
    [disabled]="disabled()"
    [answerOptions]="answerOptions()"
    [optionsKey]="params().optionsKey"
    [optionsValue]="params().optionsValue"
    (selectionChange)="setValue($event)"
  />
}
