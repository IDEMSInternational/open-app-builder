@if (params().variant === "modal") {
  <button
    class="open-combobox"
    (click)="openModal()"
    [ngClass]="{
      disabled: disabled(),
      'placeholder-style': (!value() && params().placeholder) || params().prioritisePlaceholder,
      'with-value': !!value(),
      'no-value': !value(),
      'wrap-text': params().wrap,
    }"
    [disabled]="disabled()"
  >
    {{ displayText() | translate }}
  </button>
} @else if (params().variant === "dropdown") {
  <combo-box-dropdown
    [displayText]="displayText()"
    [modalTitle]="params().modalTitle"
    [prioritisePlaceholder]="params().prioritisePlaceholder"
    [value]="value()"
    [placeholder]="params().placeholder"
    [disabled]="disabled()"
    [answerOptions]="answerOptions()"
    [optionsKey]="params().optionsKey"
    [optionsValue]="params().optionsValue"
    [optionMetaBadge]="optionMetaBadge()"
    [wrap]="params().wrap"
    (searchDismiss)="onSearchDismiss($event)"
    (selectionChange)="setValue($event)"
  />
}
