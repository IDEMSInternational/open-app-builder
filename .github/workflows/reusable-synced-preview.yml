name: TestHub Ephemeral Sync & Preview

on:
  workflow_call:
    inputs:
      user_email:
        description: 'Email of the TestHub user for the Firebase channel ID'
        required: true
        type: string
      firebase-host:
        description: 'Firebase site for hosting'
        type: string
        default: ${{vars.FIREBASE_HOSTING_TARGET}}
    secrets:
      FIREBASE_SERVICE_ACCOUNT:
        required: true
      GDRIVE_CREDENTIALS:
        required: true
      GDRIVE_TOKEN:
        required: true
      DEPLOYMENT_PRIVATE_KEY:
        required: false

env:
  FIREBASE_PROJECT_ID: ${{vars.FIREBASE_PROJECT_ID}}
  DEPLOYMENT_NAME: ${{vars.DEPLOYMENT_NAME}}

jobs:
  build_sync_deploy:
    runs-on: ubuntu-latest
    steps:
      # --- 1. Assemble the Code ---
      # Explicitly clone the engine first
      - name: Check out open-app-builder
        uses: actions/checkout@v4
        with:
          repository: "IDEMSInternational/open-app-builder"

      - name: Remove .git to allow nesting
        run: rm -rf .git

      # Clone the deployment content directly into the engine's deployments folder
      - name: Checkout Deployment Repo
        uses: actions/checkout@v4
        with:
          path: ".idems_app/deployments/${{env.DEPLOYMENT_NAME}}"

      # --- 2. Fast Native Setup (Cached) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0

      - name: Cache node modules
        uses: actions/cache@v4
        id: cache
        with:
          path: ./.yarn/cache
          key: ${{ runner.os }}-node-modules-yarn-v1-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-yarn-v1-

      - name: Install node modules
        run: yarn install --immutable

      # --- 3. Configuration & Decryption ---
      - name: Set deployment private key
        if: ${{ secrets.DEPLOYMENT_PRIVATE_KEY != '' }}
        run: |
          mkdir -p .idems_app/deployments/$DEPLOYMENT_NAME/encrypted
          echo "${{secrets.DEPLOYMENT_PRIVATE_KEY}}" > .idems_app/deployments/$DEPLOYMENT_NAME/encrypted/private.key

      - name: Set deployment
        run: yarn workflow deployment set ${{env.DEPLOYMENT_NAME}}

      # --- 4. Ephemeral Sync ---
      - name: Add Google Credentials
        run: |
          mkdir -p ./packages/scripts/config
          echo "${{secrets.GDRIVE_CREDENTIALS}}" > ./packages/scripts/config/credentials.json
          echo "${{secrets.GDRIVE_TOKEN}}" > ./packages/scripts/config/token.json

      - name: Sync fresh content from Sheets
        run: yarn workflow sync

      # --- 5. Build ---
      - name: Build Web Bundle
        run: yarn build:web
        env:
          NODE_OPTIONS: --max_old_space_size=6144

      # --- 6. Firebase Config & Deployment ---
      - name: Sanitize Email for Channel ID
        id: sanitize
        run: |
          CLEAN_EMAIL=$(echo "${{ inputs.user_email }}" | sed -e 's/[^a-zA-Z0-9]/-/g')
          echo "channel_id=testhub-$CLEAN_EMAIL" >> $GITHUB_OUTPUT

      - name: Populate Firebase Config
        run: |
          FIREBASE_RC_TARGETS=$(jq -n \
            --argjson "${{env.FIREBASE_PROJECT_ID}}" \
            '{"hosting":{"${{inputs.firebase-host}}":["${{inputs.firebase-host}}"]}}' \
            '$ARGS.named'
            )
          FIREBASE_RC=$(jq -n \
          --argjson projects '{"default":"${{env.FIREBASE_PROJECT_ID}}"}' \
          --argjson targets "$FIREBASE_RC_TARGETS" \
          '$ARGS.named'
          )
          echo $FIREBASE_RC > .firebaserc

          FIREBASE_JSON_HOSTING=$(jq -n \
          --arg target "${{inputs.firebase-host}}" \
          --arg public "www" \
          --argjson ignore '["firebase.json"]' \
          --argjson rewrites '[{"source": "**","destination": "/index.html"}]' \
          '$ARGS.named'
          )
          FIREBASE_JSON=$(jq -n \
          --argjson hosting "[$FIREBASE_JSON_HOSTING]" \
          '$ARGS.named'
          )
          echo $FIREBASE_JSON > firebase.json

      - id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "${{ env.FIREBASE_PROJECT_ID }}"
          channelId: "${{ steps.sanitize.outputs.channel_id }}"
          target: "${{inputs.firebase-host}}"
          expires: "1d"